about_content: |
  I'm a final-year Computer Science student at **Lahore University of Management Sciences** and I will be graduating in May 2026. I have
  a strong interest in the intersection of **Software Engineering and AI technologies**, particularly AI integration,
  intelligent automation, and research in emerging **Deep Learning and Generative AI** systems.

  I've built production-grade AI systems, contributed to deep learning research with Erasmus MC, and currently work
  as a Software Engineering Intern at **10Pearls**, building and testing full-stack web applications.
  I'm actively seeking roles where I can push the boundary between robust software and cutting-edge AI.

content:
  - title: Projects
    layout: list
    content:
      - layout: left
        border: weak
        title: RAG Pipeline Evaluator
        link: https://github.com/danyaalsadiq/RAG-Pipeline-Evaluator-Code
        link_text: GitHub
        additional_links:
          - title: RAG Pipeline Evaluator
            icon: fab fa-github
            url: https://github.com/danyaalsadiq/RAG-Pipeline-Evaluator-Code
        quote: >
          End-to-end RAG evaluation platform with dual LLM judges, deployed on Oracle Cloud.
        description: |
          Built and deployed an end-to-end RAG evaluation platform using dual LLM judges (Gemini + Groq/Llama)
          supporting A/B testing between RAG pipelines across **faithfulness, retrieval, and generation metrics**.
          Engineered a retrieval evaluation module with query expansion (10–15 variations per query), LLM-as-a-judge
          ground truth building, and metrics including Precision@K, Recall@K, and signal-to-noise ratio.
          Implemented generation quality scoring tracking faithfulness, hallucination, inferred, and extrapolated
          claim rates with full precision/recall/F1 breakdown and per-run LLM cost estimation.

          *Tech Stack: Python, Gemini API, Groq API, Llama, pytest, Playwright, Oracle Cloud*

      - layout: left
        border: weak
        title: Advanced Language Model Development and Optimization
        additional_links:
          - title: SmolLM — LoRA + DPO Fine-tuning
            # icon: fab fa-github
            # url: https://github.com/saadi54humayun
        quote: >
          Llama3-based LLM built from scratch with LoRA fine-tuning and Direct Preference Optimization.
        description: |
          Developed **SmolLM**, a Llama3-based language model from scratch including core architectural components —
          RMS Normalization, RoPE, GQA, and SwiGLU networks. Reduced trainable parameters to under 1% using
          **LoRA fine-tuning**. Achieved a 25% improvement in human preference alignment scores through
          **Direct Preference Optimization (DPO)**. Reduced model storage requirements via a weight-sharing scheme
          in the language modeling head.

          *Tech Stack: Python, PyTorch, Llama3, LoRA, DPO, Hugging Face*

      - layout: left
        border: weak
        title: Fine-grained Deer Species Classification
        additional_links:
          - title: Deer Species Classification
            icon: fab fa-github
            url: https://github.com/saadi54humayun/DL-Project
        quote: >
          Deep learning pipeline for fine-grained wildlife classification achieving 95% test accuracy.
        description: |
          Developed a deep learning pipeline for fine-grained deer species classification from the **Missouri Camera Trap
          dataset (LILA BC)**, achieving **95% test accuracy** — outperforming the ResNet50 baseline by 3%.
          Used **MegaDetector** for automated animal detection and image cropping.
          Improved performance on underrepresented species by 15% through **Focal Loss** for class imbalance handling
          and a stacking ensemble classifier combining MLP and XGBoost with CLIP features.

          *Tech Stack: Python, PyTorch, CLIP, XGBoost, OpenCV, MegaDetector*

      - layout: left
        border: weak
        title: CulinaryCloud — Full-Stack Recipe Platform
        additional_links:
          - title: CulinaryCloud
            icon: fab fa-github
            url: https://github.com/SE-Group-Spring-25/SE_PROJECT
        quote: >
          MERN-stack recipe sharing platform with AI-driven recommendations and real-time features.
        description: |
          Developed a full-stack recipe sharing platform with **AI-driven personalized recommendations** and
          nutritional analysis API integration, reducing manual calorie tracking time for users.
          Built with real-time capabilities using **Socket.IO** and achieved broad test coverage through an
          automated **Selenium** testing suite covering 50+ test cases.

